apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: inference-api
  description: >
    OpenAI-compatible inference service for all fine-tuned LLMs.
    Central serving layer for the ML Platform.
  tags:
    - python
    - fastapi
    - llm
    - inference
    - mlops
    - llmops
  annotations:
    backstage.io/kubernetes-id: demo-app
    backstage.io/kubernetes-namespace: default
    github.com/project-slug: ezzat223/inference-api
    backstage.io/techdocs-ref: dir:.
  links:
    - url: https://grafana.internal/d/inference
      title: Grafana Dashboard
      icon: dashboard
    - url: https://jira.internal/secure/RapidBoard.jspa?rapidView=123&projectKey=MLOPS
      title: jira dashboard
      icon: jira
spec:
  type: service
  lifecycle: production
  owner: xops-team
  system: ml-platform
  dependsOn:
    - component:model-registry
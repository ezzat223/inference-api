apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: default
  labels:
    app.kubernetes.io/name: demo-app
    backstage.io/kubernetes-id: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-app
      backstage.io/kubernetes-id: demo-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-app
        backstage.io/kubernetes-id: demo-app
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0.0
          args:
            - "-listen=:8080"
            - "-text=demo-app"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: default
  labels:
    app.kubernetes.io/name: demo-app
    backstage.io/kubernetes-id: demo-app
spec:
  selector:
    app.kubernetes.io/name: demo-app
    backstage.io/kubernetes-id: demo-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
